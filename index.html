<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abbosov Dilmurod | Vibe Coding Mutaxasisi</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --primary: #f8faff;
            --secondary: #e2e8f0;
            --accent: #6366f1;
            --accent-soft: hsla(239, 84%, 67%, 0.1);
            --dark: #0f172a;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-secondary: #64748b;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #ffffff;
            color: var(--text-main);
            height: 100vh;
            overflow: hidden; /* No scrolling allowed */
            display: flex;
        }

        .split-layout {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Chap tomon - Rasm */
        .left-pane {
            flex: 1;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .left-pane img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            animation: fadeIn 1s ease-out;
        }

        /* O'ng tomon - Ma'lumotlar */
        .right-pane {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 8%;
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(248,250,255,1));
            animation: slideInRight 1s ease-out;
        }

        .name-title {
            font-family: 'Syne', sans-serif;
            font-size: 4.5rem;
            font-weight: 800;
            color: var(--dark);
            line-height: 1.1;
            margin-bottom: 0.5rem;
        }

        .divider {
            width: 100%;
            max-width: 400px;
            height: 4px;
            background: var(--accent);
            border-radius: 2px;
            margin: 1.5rem 0;
        }

        .brand-tag {
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 3.5rem;
        }

        /* Tugmalar (Bir xil o'lcham va dizayn) */
        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
            max-width: 400px; /* Barcha tugmalar kengligi bir xil */
        }

        .link-card {
            width: 100%;
            padding: 1.2rem 1.5rem;
            background: var(--white);
            border: 2px solid var(--secondary);
            border-radius: 16px;
            text-decoration: none;
            color: var(--dark);
            display: flex;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: var(--transition);
        }

        .link-card:hover {
            transform: translateX(10px);
            border-color: var(--accent);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.15);
            background: var(--accent);
            color: var(--white);
        }

        .link-card i {
            font-size: 1.5rem;
            width: 45px;
            text-align: center;
            transition: var(--transition);
            color: var(--accent);
        }

        .link-card:hover i {
            color: var(--white);
        }

        .link-text {
            font-weight: 700;
            font-size: 1.2rem;
            flex-grow: 1;
            text-align: left;
            padding-left: 15px;
        }

        .social-group {
            display: flex;
            gap: 1.5rem;
            margin-top: 1.5rem; /* 3.5rem dan 1.5rem ga kamaytirildi (yuqoriga ko'tarish) */
            width: 100%;
            max-width: 400px;
            justify-content: flex-start;
        }

        .social-link {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            background: var(--white);
            border: 2px solid var(--secondary);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: var(--transition);
        }

        .social-link:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--white);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        /* Footer */
        footer {
            position: absolute;
            bottom: 20px;
            right: 8%;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }

        /* Animatsiyalar */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Mobil moslashuvchanlik */
        @media (max-width: 900px) {
            body { overflow-y: auto; height: auto; }
            .split-layout { flex-direction: column; }
            .left-pane { height: 50vh; }
            .right-pane {
                padding: 4rem 2rem;
                align-items: center;
                text-align: center;
            }
            .name-title { font-size: 3rem; }
            .divider { margin: 1.5rem auto; }
            .buttons-container { max-width: 100%; }
            .social-group { justify-content: center; max-width: 100%; }
            footer { position: static; margin-top: 3rem; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="split-layout">
        <!-- Chap Tomon - Fon Rasmi -->
        <div class="left-pane">
            <img src="Abbosov1.jpg" alt="Abbosov Dilmurod">
        </div>

        <!-- O'ng Tomon - Barcha ma'lumotlar -->
        <div class="right-pane">
            <h1 class="name-title">Abbosov<br>Dilmurod</h1>
            
            <div class="divider"></div>
            
            <p class="brand-tag">Vibe Coding Mutaxasisi</p>

            <div class="buttons-container">
                <a href="#" class="link-card">
                    <i class="fa-solid fa-laptop-code"></i>
                    <span class="link-text">Vibe coding kursi</span>
                </a>
                <a href="#" class="link-card">
                    <i class="fa-solid fa-user-astronaut"></i>
                    <span class="link-text">Men haqimda</span>
                </a>
                <a href="#" class="link-card">
                    <i class="fa-solid fa-paper-plane"></i>
                    <span class="link-text">Bog'lanish</span>
                </a>
            </div>

            <div class="social-group">
                <a href="#" class="social-link"><i class="fa-brands fa-telegram"></i></a>
                <a href="#" class="social-link"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" class="social-link"><i class="fa-brands fa-youtube"></i></a>
            </div>

            <footer>
                &copy; 2026. Barcha huquqlar himoyalangan.
            </footer>
        </div>
    </div>
</body>
</html>
