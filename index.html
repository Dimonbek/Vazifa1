<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abbosov Dilmurod | Vibe Coding Mutaxasisi</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="magic-ui-theme">
    <!-- Background Magic UI Elements -->
    <div class="grid-background"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div id="meteors-container"></div>

    <div class="wrapper">
        <!-- Magic UI Style Header / Hero -->
        <header class="header-section">
            <div class="header-top-row">
                <div class="edge-badge"><span class="pulse-dot"></span> Available for work</div>
                <div class="shiny-badge-wrapper">
                    <span class="shiny-badge">Vibe Coding Mutaxasisi ✨</span>
                </div>
                <div class="edge-badge"><i class="fa-solid fa-location-dot"></i> Uzbekistan</div>
            </div>
            <h1 class="main-title gradient-text">Abbosov Dilmurod</h1>
        </header>

        <!-- Bento Grid Layout for the Portfolio -->
        <main class="bento-grid">
            
            <!-- Bento Card 1: Avatar / Photo -->
            <div class="bento-card card-tall magic-hover-card p-0">
                <div class="border-beam"></div>
                <div class="card-inner image-card">
                    <img src="Abbosov1.jpg" alt="Abbosov Dilmurod">
                    <div class="image-gradient-overlay"></div>
                </div>
            </div>

            <!-- Bento Card 2: Resume -->
            <a href="#" class="bento-card magic-hover-card glass-card">
                <div class="card-inner link-content">
                    <div class="icon-circle">
                        <i class="fa-solid fa-file-lines"></i>
                    </div>
                    <div class="text-box">
                        <h3>Mening rezyumeim</h3>
                        <p>Texnik ko'nikmalarim, tajribam va yutuqlarim haqida batafsil</p>
                    </div>
                </div>
            </a>

            <!-- Bento Card 3: About Me -->
            <a href="#" class="bento-card magic-hover-card glass-card">
                <div class="card-inner link-content">
                    <div class="icon-circle">
                        <i class="fa-solid fa-user-astronaut"></i>
                    </div>
                    <div class="text-box">
                        <h3>Men haqimda</h3>
                        <p>Kasbiy faoliyatim va shaxsiy tajribalar</p>
                    </div>
                </div>
            </a>

            <!-- Bento Card 4: Contact -->
            <a href="#" class="bento-card magic-hover-card glass-card">
                <div class="border-beam"></div>
                <div class="card-inner link-content">
                    <!-- Bog'lanish ikonkasi Telegramga o'xshamasligi uchun telefon ikonkaga almashtirildi va "primary" klassi olib tashlandi -->
                    <div class="icon-circle">
                        <i class="fa-solid fa-phone"></i>
                    </div>
                    <div class="text-box">
                        <h3>Bog'lanish</h3>
                        <p>Loyihalar, darsliklar va hamkorlik uchun</p>
                    </div>
                </div>
            </a>

            <!-- Bento Card 5: Socials Stack -->
            <div class="bento-card magic-hover-card social-card-container">
                <div class="card-inner socials-stack">
                    <a href="https://t.me/Abbosov_d" target="_blank" class="social-btn"><i class="fa-brands fa-telegram"></i></a>
                    <a href="https://www.instagram.com/abbosovd_" target="_blank" class="social-btn"><i class="fa-brands fa-instagram"></i></a>
                    <a href="https://youtube.com/@abbosov_dilmurod" target="_blank" class="social-btn"><i class="fa-brands fa-youtube"></i></a>
                </div>
            </div>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
